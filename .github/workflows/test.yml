name: Tests

# warehouse-app/ is a Node project with its own test suite; this
# workflow gates the Python framework only.
on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'warehouse-app/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'warehouse-app/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools
        pip install -e ".[dev,cli]"

    - name: Run tests
      run: |
        pytest tests/ -v --cov=sentinel_v --cov-report=xml

    - name: Run linters
      run: |
        flake8 sentinel_v/ tests/ examples/ --max-line-length=88
        mypy sentinel_v/ --ignore-missing-imports

    - name: Security scan
      run: |
        bandit -r sentinel_v/
        pip-audit --skip-editable

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build package
      run: |
        python -m pip install --upgrade pip setuptools build
        python -m build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
